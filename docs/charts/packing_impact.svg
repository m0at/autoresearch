<svg xmlns="http://www.w3.org/2000/svg" width="560" height="300" viewBox="0 0 560 300">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .title { font-size: 14px; font-weight: 600; fill: #111827; }
    .axis-label { font-size: 11px; fill: #6b7280; }
    .bar-label { font-size: 12px; fill: #374151; }
    .bar-value { font-size: 13px; font-weight: 700; }
    .grid { stroke: #e5e7eb; stroke-width: 1; }
    .baseline-label { font-size: 10.5px; fill: #7c3aed; font-weight: 600; }
    .delta-text { font-size: 12px; font-weight: 700; fill: #15803d; }
    .legend-text { font-size: 11px; fill: #374151; }
  </style>

  <rect width="560" height="300" fill="white" rx="8"/>

  <!-- Title -->
  <text x="280" y="26" text-anchor="middle" class="title">Effect of Data Packing (same model, same 700 steps)</text>

  <!-- Chart area: x=100..480, y=45..240 -->
  <!-- Y axis: 0.97 to 1.10, range=0.13, height=195px, scale=195/0.13=1500 px/unit -->

  <!-- Grid at 1.10, 1.06, 1.02, 0.98 -->
  <!-- y = 45 + (1.10-val)*1500 -->
  <!-- 1.10 → 45; 1.06 → 45+60=105; 1.02→165; 0.98→225... adjust to 240 bottom -->
  <!-- Let's use 1.10 at top=45, 0.97 at bottom=240, range=0.13, scale=195/0.13=1500 -->
  <line x1="100" y1="45" x2="480" y2="45" class="grid"/>
  <line x1="100" y1="110" x2="480" y2="110" class="grid"/>
  <line x1="100" y1="175" x2="480" y2="175" class="grid"/>
  <line x1="100" y1="240" x2="480" y2="240" class="grid"/>

  <!-- Y labels -->
  <text x="92" y="49" text-anchor="end" class="axis-label">1.10</text>
  <text x="92" y="114" text-anchor="end" class="axis-label">1.06</text>
  <text x="92" y="179" text-anchor="end" class="axis-label">1.02</text>
  <text x="92" y="244" text-anchor="end" class="axis-label">0.98</text>

  <!-- Axes -->
  <line x1="100" y1="45" x2="100" y2="240" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="100" y1="240" x2="480" y2="240" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- Y axis title -->
  <text transform="translate(16,145) rotate(-90)" text-anchor="middle" class="axis-label">val_bpb (lower is better)</text>

  <!-- Karpathy baseline: 0.998 → y = 45 + (1.10-0.998)*1500 = 45+153 = 198 -->
  <line x1="100" y1="198" x2="480" y2="198" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="484" y="202" class="baseline-label">0.998</text>

  <!--
    2 bars:
    Sequential shards: 1.0567 → y = 45 + (1.10-1.0567)*1500 = 45+64.95 = 110, h=130
    Best-fit packing:  1.0084 → y = 45 + (1.10-1.0084)*1500 = 45+137.4 = 182.4, h=57.6
  -->

  <!-- Bar 1: Sequential shards — red/orange -->
  <rect x="150" y="110" width="100" height="130" fill="#dc2626" rx="4" opacity="0.8"/>
  <text x="200" y="105" text-anchor="middle" class="bar-value" fill="#dc2626">1.0567</text>
  <text x="200" y="257" text-anchor="middle" class="bar-label">Sequential</text>
  <text x="200" y="271" text-anchor="middle" class="bar-label">shards</text>

  <!-- Bar 2: Best-fit packing — blue -->
  <rect x="330" y="182" width="100" height="58" fill="#2563eb" rx="4" opacity="0.85"/>
  <text x="380" y="177" text-anchor="middle" class="bar-value" fill="#2563eb">1.0084</text>
  <text x="380" y="257" text-anchor="middle" class="bar-label">Best-fit</text>
  <text x="380" y="271" text-anchor="middle" class="bar-label">packing</text>

  <!-- Delta annotation bracket -->
  <!-- Arrow from top of bar2 to top of bar1, with delta label -->
  <!-- Bar1 top at y=110, bar2 top at y=182, both at x=250 and 330 -->
  <!-- Draw a bracket between them -->
  <line x1="258" y1="120" x2="322" y2="120" stroke="#15803d" stroke-width="1.5"/>
  <line x1="258" y1="110" x2="258" y2="182" stroke="#15803d" stroke-width="1.5"/>
  <line x1="322" y1="182" x2="322" y2="120" stroke="#15803d" stroke-width="1.5"/>
  <!-- Arrowhead at right end pointing down to bar2 top -->
  <polygon points="322,182 318,174 326,174" fill="#15803d"/>
  <!-- Delta label -->
  <text x="290" y="116" text-anchor="middle" class="delta-text">-0.049 bpb</text>
  <text x="290" y="130" text-anchor="middle" font-size="10" fill="#15803d">same data, same model</text>

  <!-- Legend -->
  <line x1="150" y1="290" x2="170" y2="290" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="174" y="294" class="legend-text">Karpathy baseline (0.998)</text>
</svg>
