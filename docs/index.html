<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>autoresearch benchmarks</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
  <link rel="stylesheet" href="https://unpkg.com/@tailwindcss/browser@4"/>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
    .recharts-cartesian-grid-horizontal line,
    .recharts-cartesian-grid-vertical line { stroke: #334155; }
    .recharts-text { fill: #94a3b8; font-size: 12px; }
    .recharts-tooltip-wrapper { font-size: 13px; }
    .recharts-default-tooltip { background: #1e293b !important; border: 1px solid #334155 !important; border-radius: 8px !important; }
    .recharts-tooltip-label { color: #e2e8f0 !important; font-weight: 600; }
    .recharts-tooltip-item { color: #94a3b8 !important; }
    .chart-card { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { createElement: h, useState } = React;
const {
  BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ReferenceLine,
  ResponsiveContainer, Cell, LabelList
} = Recharts;

// ── colours ──────────────────────────────────────────────────────────────────
const BLUE  = "#3b82f6";
const RED   = "#ef4444";
const GREEN = "#22c55e";
const ORANGE= "#f97316";
const GRAY  = "#64748b";
const PURPLE= "#a855f7";

// ── 1. Progress arc ───────────────────────────────────────────────────────────
const progressData = [
  { name: "Candle\nframework", bpb: 1.700, fill: RED,    label: "1.700" },
  { name: "Custom engine\n(20 bugs)", bpb: 1.130, fill: ORANGE, label: "1.130" },
  { name: "Bugs\nfixed",        bpb: 1.057, fill: BLUE,   label: "1.057" },
  { name: "+ Winning\nrecipe",  bpb: 1.049, fill: BLUE,   label: "1.049" },
  { name: "+ Best-fit\npacking",bpb: 1.008, fill: BLUE,   label: "1.008" },
  { name: "+ Doubled\nbatch",   bpb: 0.991, fill: GREEN,  label: "0.991" },
];

function ProgressChart() {
  return h("div", { className: "chart-card" },
    h("h2", { className: "text-white font-semibold text-lg mb-1" }, "val_bpb journey — candle to beating Karpathy"),
    h("p", { className: "text-slate-400 text-sm mb-5" }, "Each bar is the best val_bpb at that stage of development. Lower is better."),
    h(ResponsiveContainer, { width: "100%", height: 320 },
      h(BarChart, { data: progressData, margin: { top: 30, right: 20, left: 10, bottom: 40 } },
        h(CartesianGrid, { strokeDasharray: "3 3" }),
        h(XAxis, { dataKey: "name", tick: { fill: "#94a3b8", fontSize: 11 }, height: 50 }),
        h(YAxis, {
          domain: [0.94, 1.75], tickCount: 7,
          tick: { fill: "#94a3b8", fontSize: 11 },
          label: { value: "val_bpb", angle: -90, position: "insideLeft", fill: "#94a3b8", offset: 10 }
        }),
        h(Tooltip, {
          formatter: (v) => [v.toFixed(4), "val_bpb"],
          contentStyle: { background: "#1e293b", border: "1px solid #334155", borderRadius: 8 },
          labelStyle: { color: "#e2e8f0" },
          itemStyle: { color: "#94a3b8" }
        }),
        h(ReferenceLine, {
          y: 0.998, stroke: PURPLE, strokeDasharray: "6 4", strokeWidth: 2,
          label: { value: "Karpathy 0.998", position: "right", fill: PURPLE, fontSize: 11 }
        }),
        h(Bar, { dataKey: "bpb", radius: [4,4,0,0] },
          h(LabelList, {
            dataKey: "bpb",
            position: "top",
            formatter: (v) => v.toFixed(3),
            style: { fill: "#cbd5e1", fontSize: 10, fontWeight: 600 }
          }),
          ...progressData.map((d, i) => h(Cell, { key: i, fill: d.fill, fillOpacity: 0.85 }))
        )
      )
    )
  );
}

// ── 2. Step benchmark ─────────────────────────────────────────────────────────
const stepData = [
  { steps: "700",  python: 1.0166, engine: 0.9907 },
  { steps: "1000", python: null,   engine: null   },
  { steps: "1500", python: null,   engine: null   },
];

function StepChart() {
  return h("div", { className: "chart-card" },
    h("h2", { className: "text-white font-semibold text-lg mb-1" }, "Step-generalization benchmark: Python vs Engine"),
    h("p", { className: "text-slate-400 text-sm mb-5" }, "Same fixed step budget. Same data. Lower val_bpb = better generalization per compute."),
    h("div", { className: "flex gap-3 mb-4 text-xs" },
      h("span", { className: "px-2 py-1 rounded bg-slate-700 text-slate-300 font-mono" }, "700 steps: recorded"),
      h("span", { className: "px-2 py-1 rounded bg-slate-800 text-slate-500 border border-dashed border-slate-600 font-mono" }, "1000/1500: pending"),
    ),
    h(ResponsiveContainer, { width: "100%", height: 300 },
      h(BarChart, { data: stepData, margin: { top: 20, right: 80, left: 10, bottom: 20 } },
        h(CartesianGrid, { strokeDasharray: "3 3" }),
        h(XAxis, {
          dataKey: "steps", tick: { fill: "#94a3b8", fontSize: 12 },
          label: { value: "Optimizer Steps", position: "insideBottom", offset: -10, fill: "#94a3b8" }
        }),
        h(YAxis, {
          domain: [0.95, 1.06], tickCount: 6,
          tick: { fill: "#94a3b8", fontSize: 11 },
          label: { value: "val_bpb", angle: -90, position: "insideLeft", fill: "#94a3b8", offset: 10 }
        }),
        h(Tooltip, {
          formatter: (v, name) => v != null ? [v.toFixed(4), name] : ["pending", name],
          contentStyle: { background: "#1e293b", border: "1px solid #334155", borderRadius: 8 },
          labelStyle: { color: "#e2e8f0" },
          itemStyle: { color: "#94a3b8" }
        }),
        h(ReferenceLine, {
          y: 0.998, stroke: PURPLE, strokeDasharray: "6 4", strokeWidth: 2,
          label: { value: "Karpathy 0.998", position: "right", fill: PURPLE, fontSize: 11 }
        }),
        h(Legend, { wrapperStyle: { color: "#94a3b8", fontSize: 12 } }),
        h(Bar, { dataKey: "python", name: "Python reference", fill: GRAY, radius: [3,3,0,0], fillOpacity: 0.8 },
          h(LabelList, {
            dataKey: "python",
            position: "top",
            formatter: (v) => v != null ? v.toFixed(4) : "",
            style: { fill: "#94a3b8", fontSize: 10 }
          })
        ),
        h(Bar, { dataKey: "engine", name: "Rust engine", fill: BLUE, radius: [3,3,0,0], fillOpacity: 0.9 },
          h(LabelList, {
            dataKey: "engine",
            position: "top",
            formatter: (v) => v != null ? v.toFixed(4) : "",
            style: { fill: "#93c5fd", fontSize: 10, fontWeight: 600 }
          })
        )
      )
    )
  );
}

// ── 3. Batch ablation ─────────────────────────────────────────────────────────
const batchData = [
  { batch: "262K (half)",     bpb: 1.040, tokens: "183M",  winner: false },
  { batch: "524K (original)", bpb: 1.009, tokens: "367M",  winner: false },
  { batch: "1M (double)",     bpb: 0.991, tokens: "734M",  winner: true  },
];

function BatchChart() {
  return h("div", { className: "chart-card" },
    h("h2", { className: "text-white font-semibold text-lg mb-1" }, "Batch size ablation (700 steps each)"),
    h("p", { className: "text-slate-400 text-sm mb-5" }, "Larger batches = more tokens per run = better generalization at fixed step budget."),
    h(ResponsiveContainer, { width: "100%", height: 300 },
      h(BarChart, { data: batchData, margin: { top: 30, right: 80, left: 10, bottom: 20 } },
        h(CartesianGrid, { strokeDasharray: "3 3" }),
        h(XAxis, {
          dataKey: "batch", tick: { fill: "#94a3b8", fontSize: 11 },
          label: { value: "Tokens per optimizer step", position: "insideBottom", offset: -10, fill: "#94a3b8" }
        }),
        h(YAxis, {
          domain: [0.97, 1.06], tickCount: 6,
          tick: { fill: "#94a3b8", fontSize: 11 },
          label: { value: "val_bpb", angle: -90, position: "insideLeft", fill: "#94a3b8", offset: 10 }
        }),
        h(Tooltip, {
          formatter: (v, _, props) => [
            `${v.toFixed(4)} (${props.payload.tokens} total tokens)`
          ],
          contentStyle: { background: "#1e293b", border: "1px solid #334155", borderRadius: 8 },
          labelStyle: { color: "#e2e8f0" },
          itemStyle: { color: "#94a3b8" }
        }),
        h(ReferenceLine, {
          y: 0.998, stroke: PURPLE, strokeDasharray: "6 4", strokeWidth: 2,
          label: { value: "Karpathy 0.998", position: "right", fill: PURPLE, fontSize: 11 }
        }),
        h(Bar, { dataKey: "bpb", radius: [4,4,0,0] },
          h(LabelList, {
            dataKey: "bpb",
            position: "top",
            formatter: (v) => v.toFixed(4),
            style: { fill: "#cbd5e1", fontSize: 11, fontWeight: 600 }
          }),
          ...batchData.map((d, i) => h(Cell, { key: i, fill: d.winner ? GREEN : BLUE, fillOpacity: d.winner ? 0.9 : 0.75 }))
        )
      )
    )
  );
}

// ── 4. Packing impact ─────────────────────────────────────────────────────────
const packingData = [
  { name: "Sequential shards\n(old pipeline)", bpb: 1.0567, fill: RED    },
  { name: "Best-fit packing\n(feeder.py)",     bpb: 1.0084, fill: BLUE   },
];

function PackingChart() {
  return h("div", { className: "chart-card" },
    h("h2", { className: "text-white font-semibold text-lg mb-1" }, "Effect of data packing"),
    h("p", { className: "text-slate-400 text-sm mb-5" }, "Identical model, optimizer, step count. Only document arrangement changed. -0.049 bpb."),
    h(ResponsiveContainer, { width: "100%", height: 280 },
      h(BarChart, { data: packingData, margin: { top: 30, right: 80, left: 10, bottom: 20 } },
        h(CartesianGrid, { strokeDasharray: "3 3" }),
        h(XAxis, { dataKey: "name", tick: { fill: "#94a3b8", fontSize: 11 }, height: 50 }),
        h(YAxis, {
          domain: [0.97, 1.10], tickCount: 5,
          tick: { fill: "#94a3b8", fontSize: 11 },
          label: { value: "val_bpb", angle: -90, position: "insideLeft", fill: "#94a3b8", offset: 10 }
        }),
        h(Tooltip, {
          formatter: (v) => [v.toFixed(4), "val_bpb"],
          contentStyle: { background: "#1e293b", border: "1px solid #334155", borderRadius: 8 },
          labelStyle: { color: "#e2e8f0" },
          itemStyle: { color: "#94a3b8" }
        }),
        h(ReferenceLine, {
          y: 0.998, stroke: PURPLE, strokeDasharray: "6 4", strokeWidth: 2,
          label: { value: "Karpathy 0.998", position: "right", fill: PURPLE, fontSize: 11 }
        }),
        h(Bar, { dataKey: "bpb", radius: [4,4,0,0] },
          h(LabelList, {
            dataKey: "bpb",
            position: "top",
            formatter: (v) => v.toFixed(4),
            style: { fill: "#cbd5e1", fontSize: 12, fontWeight: 700 }
          }),
          ...packingData.map((d, i) => h(Cell, { key: i, fill: d.fill, fillOpacity: 0.85 }))
        )
      )
    )
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  return h("div", { className: "max-w-5xl mx-auto px-4 py-10" },

    // Header
    h("div", { className: "mb-10" },
      h("div", { className: "flex items-baseline gap-3 mb-2" },
        h("h1", { className: "text-3xl font-bold text-white" }, "autoresearch"),
        h("a", {
          href: "https://github.com/andyalky/autoresearch",
          className: "text-sm text-blue-400 hover:text-blue-300 transition"
        }, "GitHub →")
      ),
      h("p", { className: "text-slate-300 text-base leading-relaxed max-w-3xl" },
        "Rust + CUDA custom GPT training engine. Same model and metric as ",
        h("a", { href: "https://x.com/karpathy/status/2029701092347630069", className: "text-blue-400 hover:underline" }, "Karpathy's autoresearch"),
        ". Beat val_bpb 0.998 baseline with ",
        h("span", { className: "text-green-400 font-semibold" }, "0.9907"),
        " at 700 optimizer steps after 20 bug fixes, 125 hyperparameter experiments, and a data packing revelation."
      ),
      h("div", { className: "flex gap-4 mt-4 text-sm" },
        h("span", { className: "px-3 py-1 rounded-full bg-green-900/50 text-green-300 border border-green-700/50 font-semibold" }, "val_bpb 0.9907"),
        h("span", { className: "px-3 py-1 rounded-full bg-blue-900/50 text-blue-300 border border-blue-700/50" }, "700 optimizer steps"),
        h("span", { className: "px-3 py-1 rounded-full bg-slate-800 text-slate-300 border border-slate-600" }, "1× H100 SXM · ~$0.40/run"),
        h("span", { className: "px-3 py-1 rounded-full bg-slate-800 text-slate-300 border border-slate-600" }, "53.5M params"),
      )
    ),

    // Charts grid
    h("div", { className: "grid grid-cols-1 gap-6" },
      h(ProgressChart),
      h("div", { className: "grid grid-cols-1 md:grid-cols-2 gap-6" },
        h(StepChart),
        h(BatchChart),
      ),
      h(PackingChart),
    ),

    // Footer
    h("div", { className: "mt-10 pt-6 border-t border-slate-700 text-sm text-slate-500 flex justify-between items-center" },
      h("span", null, "autoresearch · Rust + CUDA · MIT License"),
      h("a", {
        href: "https://github.com/andyalky/autoresearch",
        className: "text-blue-400 hover:text-blue-300 transition"
      }, "View on GitHub →")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
